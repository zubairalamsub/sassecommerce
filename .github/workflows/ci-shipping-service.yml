name: CI - Shipping Service

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/shipping-service/**'
      - '.github/workflows/ci-shipping-service.yml'
      - '.github/workflows/go-service.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/shipping-service/**'

jobs:
  ci:
    uses: ./.github/workflows/go-service.yml
    with:
      service-name: shipping-service
      service-path: services/shipping-service
      needs-postgres: true
