name: CI - Search Service

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/search-service/**'
      - '.github/workflows/ci-search-service.yml'
      - '.github/workflows/go-service.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/search-service/**'

jobs:
  ci:
    uses: ./.github/workflows/go-service.yml
    with:
      service-name: search-service
      service-path: services/search-service
      needs-postgres: true
