name: CI - Promotion Service

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/promotion-service/**'
      - '.github/workflows/ci-promotion-service.yml'
      - '.github/workflows/go-service.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/promotion-service/**'

jobs:
  ci:
    uses: ./.github/workflows/go-service.yml
    with:
      service-name: promotion-service
      service-path: services/promotion-service
      needs-postgres: true
