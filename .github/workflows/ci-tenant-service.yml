name: CI - Tenant Service

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/tenant-service/**'
      - '.github/workflows/ci-tenant-service.yml'
      - '.github/workflows/go-service.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/tenant-service/**'

jobs:
  ci:
    uses: ./.github/workflows/go-service.yml
    with:
      service-name: tenant-service
      service-path: services/tenant-service
      needs-postgres: true
      needs-redis: true
