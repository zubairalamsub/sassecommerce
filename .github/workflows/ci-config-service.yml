name: CI - Config Service

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/config-service/**'
      - '.github/workflows/ci-config-service.yml'
      - '.github/workflows/go-service.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/config-service/**'

jobs:
  ci:
    uses: ./.github/workflows/go-service.yml
    with:
      service-name: config-service
      service-path: services/config-service
      needs-postgres: true
