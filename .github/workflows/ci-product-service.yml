name: CI - Product Service

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/product-service/**'
      - '.github/workflows/ci-product-service.yml'
      - '.github/workflows/go-service.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/product-service/**'

jobs:
  ci:
    uses: ./.github/workflows/go-service.yml
    with:
      service-name: product-service
      service-path: services/product-service
      needs-mongodb: true
