name: CI - Notification Service

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/notification-service/**'
      - '.github/workflows/ci-notification-service.yml'
      - '.github/workflows/go-service.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/notification-service/**'

jobs:
  ci:
    uses: ./.github/workflows/go-service.yml
    with:
      service-name: notification-service
      service-path: services/notification-service
      needs-postgres: true
