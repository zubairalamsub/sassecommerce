global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ── Microservices (Go) ──────────────────────────────────────
  - job_name: "order-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["order-service:8080"]
        labels:
          service: order-service
          language: go

  - job_name: "tenant-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["tenant-service:8080"]
        labels:
          service: tenant-service
          language: go

  - job_name: "user-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["user-service:8082"]
        labels:
          service: user-service
          language: go

  - job_name: "product-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["product-service:8083"]
        labels:
          service: product-service
          language: go

  - job_name: "shipping-service"
