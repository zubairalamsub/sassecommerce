name: CI - Analytics Service

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/analytics-service/**'
      - '.github/workflows/ci-analytics-service.yml'
      - '.github/workflows/go-service.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/analytics-service/**'

jobs:
  ci:
    uses: ./.github/workflows/go-service.yml
    with:
      service-name: analytics-service
      service-path: services/analytics-service
      needs-postgres: true
