name: Go Service CI

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      service-path:
        required: true
        type: string
      go-version:
        required: false
        type: string
        default: '1.21'
      needs-postgres:
        required: false
        type: boolean
        default: false
      needs-mongodb:
        required: false
        type: boolean
        default: false
      needs-redis:
        required: false
        type: boolean
        default: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start PostgreSQL
        if: inputs.needs-postgres
        run: |
          docker run -d --name postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=${{ inputs.service-name }}_test \
            -p 5432:5432 \
            --health-cmd pg_isready \
            --health-interval 5s \
            --health-timeout 3s \
            --health-retries 10 \
            postgres:15-alpine
          # Wait for healthy
          until docker inspect --format='{{.State.Health.Status}}' postgres 2>/dev/null | grep -q healthy; do sleep 1; done

      - name: Start MongoDB
        if: inputs.needs-mongodb
        run: |
          docker run -d --name mongodb -p 27017:27017 mongo:7
          sleep 3

      - name: Start Redis
        if: inputs.needs-redis
        run: |
          docker run -d --name redis -p 6379:6379 redis:7-alpine
          sleep 2

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          cache-dependency-path: ${{ inputs.service-path }}/go.sum

      - name: Download dependencies
        working-directory: ${{ inputs.service-path }}
        run: go mod download

      - name: Build
        working-directory: ${{ inputs.service-path }}
        run: go build ./...

      - name: Run tests
        working-directory: ${{ inputs.service-path }}
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: ${{ inputs.service-name }}_test
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/${{ inputs.service-name }}_test?sslmode=disable
          MONGODB_URI: mongodb://localhost:27017
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic -timeout 120s ./...

      - name: Coverage summary
        if: always()
        working-directory: ${{ inputs.service-path }}
        run: |
          if [ -f coverage.out ]; then
            go tool cover -func=coverage.out | tail -1
          fi

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ inputs.service-name }}
          path: ${{ inputs.service-path }}/coverage.out
          retention-days: 14
          if-no-files-found: ignore

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ${{ inputs.service-path }}
          args: --timeout=5m

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.service-path }}
          push: false
          tags: ${{ inputs.service-name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
