openapi: 3.0.3
info:
  title: Promotion Service API
  description: |
    Multi-tenant promotion, coupon, and loyalty points service for the
    e-commerce platform. Supports percentage and fixed discounts,
    buy-X-get-Y offers, free shipping promotions, coupon code validation
    and application, and a tiered loyalty rewards program.
    Bangladesh-first market with BDT currency.
  version: 1.0.0
  contact:
    email: it@bracsaajan.com

servers:
  - url: http://localhost:5008/api/v1
    description: Local development
  - url: https://api.example.com/api/v1
    description: Production

tags:
  - name: Promotions
    description: Promotion management
  - name: Coupons
    description: Coupon code management and validation
  - name: Loyalty
    description: Loyalty points and tier management

paths:
  /promotions:
    post:
      tags: [Promotions]
      summary: Create a new promotion
      operationId: createPromotion
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePromotionRequest'
            example:
              tenant_id: "t_01HXYZ"
              name: "Pohela Boishakh Sale"
              type: "percentage"
              value: 15
              min_purchase: 1000
              max_discount: 5000
              start_date: "2026-04-14T00:00:00Z"
              end_date: "2026-04-20T23:59:59Z"
              applicable_products: []
              applicable_categories: ["clothing", "electronics"]
      responses:
        '201':
          description: Promotion created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Promotion'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /promotions/{id}:
    get:
      tags: [Promotions]
      summary: Get promotion by ID
      operationId: getPromotionById
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "promo_01HXYZ"
      responses:
        '200':
          description: Promotion details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Promotion'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /promotions/active:
    get:
      tags: [Promotions]
      summary: List currently active promotions
      operationId: getActivePromotions
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
          example: "t_01HXYZ"
      responses:
        '200':
          description: List of active promotions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Promotion'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /coupons:
    post:
      tags: [Coupons]
      summary: Create a coupon code
      operationId: createCoupon
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCouponRequest'
            example:
              tenant_id: "t_01HXYZ"
              code: "BOISHAKH2026"
              promotion_id: "promo_01HXYZ"
              max_uses: 1000
              per_user_limit: 1
      responses:
        '201':
          description: Coupon created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Coupon'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /coupons/validate/{code}:
    post:
      tags: [Coupons]
      summary: Validate a coupon code against a cart
      description: |
        Checks if a coupon code is valid and calculates the discount
        that would be applied to the given cart. Does not consume
        a use of the coupon.
      operationId: validateCoupon
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - name: code
          in: path
          required: true
          schema:
            type: string
          example: "BOISHAKH2026"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateCouponRequest'
            example:
              tenant_id: "t_01HXYZ"
              cart_total: 5500.00
              items:
                - product_id: "prod_01HXYZ"
                  category: "electronics"
                  quantity: 1
                  price: 3500.00
                - product_id: "prod_02HXYZ"
                  category: "clothing"
                  quantity: 2
                  price: 1000.00
      responses:
        '200':
          description: Coupon validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CouponValidationResult'
              example:
                valid: true
                coupon_code: "BOISHAKH2026"
                discount_amount: 825.00
                discount_currency: "BDT"
                promotion:
                  id: "promo_01HXYZ"
                  name: "Pohela Boishakh Sale"
                  type: "percentage"
                  value: 15
                message: "Coupon is valid. You save 825 BDT!"
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /coupons/apply:
    post:
      tags: [Coupons]
      summary: Apply a coupon to an order
      description: |
        Applies the coupon to an order, consuming one use of the coupon.
        Should be called after validation during the checkout process.
      operationId: applyCoupon
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplyCouponRequest'
            example:
              tenant_id: "t_01HXYZ"
              code: "BOISHAKH2026"
              order_id: "ord_01HXYZ"
              cart_total: 5500.00
      responses:
        '200':
          description: Coupon applied successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CouponApplicationResult'
              example:
                success: true
                coupon_code: "BOISHAKH2026"
                order_id: "ord_01HXYZ"
                discount_amount: 825.00
                discount_currency: "BDT"
                final_total: 4675.00
                message: "Coupon applied successfully. You saved 825 BDT!"
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /loyalty/{userId}:
    get:
      tags: [Loyalty]
      summary: Get loyalty account for a user
      operationId: getLoyaltyAccount
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - name: userId
          in: path
          required: true
          schema:
            type: string
          example: "u_01HXYZ"
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
          example: "t_01HXYZ"
      responses:
        '200':
          description: Loyalty account details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoyaltyAccount'
              example:
                user_id: "u_01HXYZ"
                tenant_id: "t_01HXYZ"
                points: 2450
                tier: "silver"
                total_points_earned: 5200
                total_points_redeemed: 2750
                tier_progress:
                  current_tier: "silver"
                  next_tier: "gold"
                  points_to_next_tier: 2550
                history:
                  - id: "lh_01HXYZ"
                    type: "earn"
                    points: 350
                    order_id: "ord_01HXYZ"
                    description: "Points earned for order #ORD-2026-0418"
                    created_at: "2026-04-18T10:30:00Z"
                  - id: "lh_02HXYZ"
                    type: "redeem"
                    points: -500
                    order_id: "ord_02HXYZ"
                    description: "Points redeemed for discount on order #ORD-2026-0415"
                    created_at: "2026-04-15T14:00:00Z"
                created_at: "2025-06-01T00:00:00Z"
                updated_at: "2026-04-18T10:30:00Z"
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /loyalty/points:
    post:
      tags: [Loyalty]
      summary: Earn or redeem loyalty points
      operationId: processLoyaltyPoints
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessPointsRequest'
            example:
              tenant_id: "t_01HXYZ"
              user_id: "u_01HXYZ"
              points: 350
              type: "earn"
              order_id: "ord_01HXYZ"
              description: "Points earned for order #ORD-2026-0418"
      responses:
        '200':
          description: Points processed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessPointsResult'
              example:
                success: true
                user_id: "u_01HXYZ"
                type: "earn"
                points_processed: 350
                new_balance: 2450
                tier: "silver"
                message: "350 points earned. New balance: 2,450 points."
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    TenantIdHeader:
      name: X-Tenant-ID
      in: header
      required: true
      description: Tenant identifier for multi-tenant isolation
      schema:
        type: string
      example: "t_01HXYZ"

  schemas:
    PromotionType:
      type: string
      enum:
        - percentage
        - fixed
        - buy_x_get_y
        - free_shipping

    LoyaltyTier:
      type: string
      enum:
        - bronze
        - silver
        - gold
        - platinum

    PointsType:
      type: string
      enum:
        - earn
        - redeem

    CreatePromotionRequest:
      type: object
      required:
        - tenant_id
        - name
        - type
        - value
        - start_date
        - end_date
      properties:
        tenant_id:
          type: string
          example: "t_01HXYZ"
        name:
          type: string
          example: "Pohela Boishakh Sale"
        type:
          $ref: '#/components/schemas/PromotionType'
        value:
          type: number
          format: decimal
          description: Percentage value (0-100) for percentage type, fixed amount in BDT for fixed type
          example: 15
        min_purchase:
          type: number
          format: decimal
          nullable: true
          description: Minimum cart total to qualify (BDT)
          example: 1000
        max_discount:
          type: number
          format: decimal
          nullable: true
          description: Maximum discount cap (BDT), applicable for percentage type
          example: 5000
        start_date:
          type: string
          format: date-time
          example: "2026-04-14T00:00:00Z"
        end_date:
          type: string
          format: date-time
          example: "2026-04-20T23:59:59Z"
        applicable_products:
          type: array
          items:
            type: string
          nullable: true
          description: Specific product IDs this promotion applies to (empty means all)
          example: []
        applicable_categories:
          type: array
          items:
            type: string
          nullable: true
          description: Specific category slugs this promotion applies to (empty means all)
          example: ["clothing", "electronics"]

    Promotion:
      type: object
      properties:
        id:
          type: string
          example: "promo_01HXYZ"
        tenant_id:
          type: string
          example: "t_01HXYZ"
        name:
          type: string
          example: "Pohela Boishakh Sale"
        type:
          $ref: '#/components/schemas/PromotionType'
        value:
          type: number
          format: decimal
          example: 15
        min_purchase:
          type: number
          format: decimal
          nullable: true
          example: 1000
        max_discount:
          type: number
          format: decimal
          nullable: true
          example: 5000
        start_date:
          type: string
          format: date-time
          example: "2026-04-14T00:00:00Z"
        end_date:
          type: string
          format: date-time
          example: "2026-04-20T23:59:59Z"
        applicable_products:
          type: array
          items:
            type: string
          example: []
        applicable_categories:
          type: array
          items:
            type: string
          example: ["clothing", "electronics"]
        is_active:
          type: boolean
          description: Whether the promotion is currently within its date range and enabled
          example: true
        created_at:
          type: string
          format: date-time
          example: "2026-04-10T08:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-04-10T08:00:00Z"

    CreateCouponRequest:
      type: object
      required:
        - tenant_id
        - code
        - promotion_id
      properties:
        tenant_id:
          type: string
          example: "t_01HXYZ"
        code:
          type: string
          description: Unique coupon code (case-insensitive)
          example: "BOISHAKH2026"
        promotion_id:
          type: string
          description: The promotion this coupon activates
          example: "promo_01HXYZ"
        max_uses:
          type: integer
          nullable: true
          description: Maximum total uses across all users (null = unlimited)
          minimum: 1
          example: 1000
        per_user_limit:
          type: integer
          nullable: true
          description: Maximum uses per user (null = unlimited)
          minimum: 1
          example: 1

    Coupon:
      type: object
      properties:
        id:
          type: string
          example: "cpn_01HXYZ"
        tenant_id:
          type: string
          example: "t_01HXYZ"
        code:
          type: string
          example: "BOISHAKH2026"
        promotion_id:
          type: string
          example: "promo_01HXYZ"
        max_uses:
          type: integer
          nullable: true
          example: 1000
        current_uses:
          type: integer
          example: 42
        per_user_limit:
          type: integer
          nullable: true
          example: 1
        is_active:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: "2026-04-10T09:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-04-18T10:00:00Z"

    ValidateCouponRequest:
      type: object
      required:
        - tenant_id
        - cart_total
        - items
      properties:
        tenant_id:
          type: string
          example: "t_01HXYZ"
        cart_total:
          type: number
          format: decimal
          example: 5500.00
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'

    CartItem:
      type: object
      properties:
        product_id:
          type: string
          example: "prod_01HXYZ"
        category:
          type: string
          example: "electronics"
        quantity:
          type: integer
          minimum: 1
          example: 1
        price:
          type: number
          format: decimal
          description: Unit price in BDT
          example: 3500.00

    CouponValidationResult:
      type: object
      properties:
        valid:
          type: boolean
          example: true
        coupon_code:
          type: string
          example: "BOISHAKH2026"
        discount_amount:
          type: number
          format: decimal
          description: Calculated discount in BDT
          example: 825.00
        discount_currency:
          type: string
          example: "BDT"
        promotion:
          type: object
          properties:
            id:
              type: string
              example: "promo_01HXYZ"
            name:
              type: string
              example: "Pohela Boishakh Sale"
            type:
              $ref: '#/components/schemas/PromotionType'
            value:
              type: number
              format: decimal
              example: 15
        message:
          type: string
          example: "Coupon is valid. You save 825 BDT!"

    ApplyCouponRequest:
      type: object
      required:
        - tenant_id
        - code
        - order_id
        - cart_total
      properties:
        tenant_id:
          type: string
          example: "t_01HXYZ"
        code:
          type: string
          example: "BOISHAKH2026"
        order_id:
          type: string
          example: "ord_01HXYZ"
        cart_total:
          type: number
          format: decimal
          example: 5500.00

    CouponApplicationResult:
      type: object
      properties:
        success:
          type: boolean
          example: true
        coupon_code:
          type: string
          example: "BOISHAKH2026"
        order_id:
          type: string
          example: "ord_01HXYZ"
        discount_amount:
          type: number
          format: decimal
          example: 825.00
        discount_currency:
          type: string
          example: "BDT"
        final_total:
          type: number
          format: decimal
          example: 4675.00
        message:
          type: string
          example: "Coupon applied successfully. You saved 825 BDT!"

    LoyaltyAccount:
      type: object
      properties:
        user_id:
          type: string
          example: "u_01HXYZ"
        tenant_id:
          type: string
          example: "t_01HXYZ"
        points:
          type: integer
          description: Current available points balance
          example: 2450
        tier:
          $ref: '#/components/schemas/LoyaltyTier'
        total_points_earned:
          type: integer
          example: 5200
        total_points_redeemed:
          type: integer
          example: 2750
        tier_progress:
          type: object
          properties:
            current_tier:
              $ref: '#/components/schemas/LoyaltyTier'
            next_tier:
              $ref: '#/components/schemas/LoyaltyTier'
            points_to_next_tier:
              type: integer
              description: Points needed to reach the next tier
              example: 2550
        history:
          type: array
          items:
            $ref: '#/components/schemas/LoyaltyHistoryEntry'
        created_at:
          type: string
          format: date-time
          example: "2025-06-01T00:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-04-18T10:30:00Z"

    LoyaltyHistoryEntry:
      type: object
      properties:
        id:
          type: string
          example: "lh_01HXYZ"
        type:
          $ref: '#/components/schemas/PointsType'
        points:
          type: integer
          description: Positive for earned, negative for redeemed
          example: 350
        order_id:
          type: string
          nullable: true
          example: "ord_01HXYZ"
        description:
          type: string
          example: "Points earned for order #ORD-2026-0418"
        created_at:
          type: string
          format: date-time
          example: "2026-04-18T10:30:00Z"

    ProcessPointsRequest:
      type: object
      required:
        - tenant_id
        - user_id
        - points
        - type
      properties:
        tenant_id:
          type: string
          example: "t_01HXYZ"
        user_id:
          type: string
          example: "u_01HXYZ"
        points:
          type: integer
          minimum: 1
          description: Number of points to earn or redeem
          example: 350
        type:
          $ref: '#/components/schemas/PointsType'
        order_id:
          type: string
          nullable: true
          description: Associated order ID
          example: "ord_01HXYZ"
        description:
          type: string
          nullable: true
          example: "Points earned for order #ORD-2026-0418"

    ProcessPointsResult:
      type: object
      properties:
        success:
          type: boolean
          example: true
        user_id:
          type: string
          example: "u_01HXYZ"
        type:
          $ref: '#/components/schemas/PointsType'
        points_processed:
          type: integer
          example: 350
        new_balance:
          type: integer
          example: 2450
        tier:
          $ref: '#/components/schemas/LoyaltyTier'
        message:
          type: string
          example: "350 points earned. New balance: 2,450 points."

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 400
        title:
          type: string
          example: "Bad Request"
        detail:
          type: string
          example: "Validation failed for one or more fields."
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            code: ["Coupon code is required."]

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: 400
            title: "Bad Request"
            detail: "Validation failed for one or more fields."
            errors:
              code: ["Coupon code is required."]

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: 404
            title: "Not Found"
            detail: "The requested resource was not found."

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: 500
            title: "Internal Server Error"
            detail: "An unexpected error occurred. Please try again later."
